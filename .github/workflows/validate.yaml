---
name: Validate ESPHome

on:
  push:
    branches:
      - main
    paths:
      - "**/*.yaml"
      - "**/*.yml"

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  discover:
    name: Discover ESPHome configs
    runs-on: ubuntu-latest

    outputs:
      configs: ${{ steps.configs.outputs.configs }}
      count: ${{ steps.configs.outputs.count }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Find configs to validate
        id: configs
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          python <<'PY'
          import json
          import os
          import re
          import subprocess
          from pathlib import Path

          def git(*args: str) -> str:
              return subprocess.check_output(["git", *args], text=True).strip()

          def yaml_files(files: list[str]) -> list[str]:
              ignored = {
                  "secrets.yaml",
                  "secrets.yml",
              }

              result = []

              for file in files:
                  path = Path(file)

                  if path.suffix.lower() not in {".yaml", ".yml"}:
                      continue

                  if path.name in ignored:
                      continue

                  if path.parts and path.parts[0] == ".github":
                      continue

                  if not path.exists() or not path.is_file():
                      continue

                  result.append(file)

              return sorted(set(result))

          def changed_files() -> list[str]:
              if os.environ["EVENT_NAME"] == "workflow_dispatch":
                  return yaml_files(git("ls-files").splitlines())

              before = os.environ.get("BEFORE_SHA", "")
              current = os.environ["CURRENT_SHA"]

              if not before or re.fullmatch(r"0+", before):
                  files = git("ls-files").splitlines()
                  return yaml_files(files)

              files = git(
                  "diff",
                  "--name-only",
                  "--diff-filter=ACMRT",
                  before,
                  current,
              ).splitlines()

              return yaml_files(files)

          def friendly_name(file: str) -> str | None:
              path = Path(file)

              try:
                  for raw in path.read_text(encoding="utf-8", errors="ignore").splitlines():
                      line = raw.strip()

                      if not line or line.startswith("#"):
                          continue

                      match = re.match(r"^\s*friendly_name\s*:\s*(.+?)\s*(?:#.*)?$", raw)

                      if not match:
                          continue

                      value = match.group(1).strip()

                      if value in {"", "|", ">"}:
                          return None

                      if (
                          len(value) >= 2
                          and value[0] == value[-1]
                          and value[0] in {"'", '"'}
                      ):
                          value = value[1:-1].strip()

                      return value or None

              except OSError:
                  return None

              return None

          configs = []
          skipped = []

          for file in changed_files():
              name = friendly_name(file)

              if not name:
                  skipped.append(file)
                  continue

              slug = re.sub(r"[^A-Za-z0-9_.-]+", "-", file).strip("-")

              configs.append({
                  "file": file,
                  "friendly_name": name,
                  "slug": slug,
              })

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"configs={json.dumps(configs, separators=(',', ':'))}\n")
              output.write(f"count={len(configs)}\n")

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary:
              summary.write("## ESPHome configs\n\n")

              if configs:
                  summary.write("| Device | Config |\n")
                  summary.write("| --- | --- |\n")

                  for config in configs:
                      summary.write(f"| {config['friendly_name']} | `{config['file']}` |\n")

                  summary.write("\n")
              else:
                  summary.write("No changed ESPHome configs found.\n\n")

              if skipped:
                  summary.write("<details>\n")
                  summary.write("<summary>Skipped YAML files</summary>\n\n")

                  for file in skipped:
                      summary.write(f"- `{file}`: no `friendly_name` found\n")

                  summary.write("\n</details>\n")

          for file in skipped:
              print(f"::notice file={file}::Skipped YAML file with no friendly_name")
          PY

  validate:
    name: Validate ${{ matrix.friendly_name }}
    runs-on: ubuntu-latest
    needs:
      - discover

    if: needs.discover.outputs.count != '0'

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.discover.outputs.configs) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install ESPHome
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install esphome

      - name: Provide CI secrets
        shell: bash
        run: |
          cat > secrets.yaml <<'EOF'
          wifi_ssid: "dummy-ssid"
          wifi_password: "dummy-password"
          api_key: "NTaJhzu9F3FQQW/TBqjSkr50euZwR/Po6Op50tmceiw="
          api_encryption_key: "NTaJhzu9F3FQQW/TBqjSkr50euZwR/Po6Op50tmceiw="
          ota_password: "dummy-ota-password"
          fallback_ap_password: "dummy-fallback-password"
          mqtt_username: "dummy-mqtt-user"
          mqtt_password: "dummy-mqtt-password"
          EOF

      - name: Validate config
        id: validate
        shell: bash
        env:
          CONFIG_FILE: ${{ matrix.file }}
          CONFIG_SLUG: ${{ matrix.slug }}
        run: |
          mkdir -p logs

          echo "::group::esphome config ${CONFIG_FILE}"

          set +e
          set -o pipefail
          esphome config "${CONFIG_FILE}" 2>&1 | tee "logs/${CONFIG_SLUG}.log"
          status="${PIPESTATUS[0]}"
          set -e

          echo "::endgroup::"

          exit "${status}"

      - name: Write summary
        if: always()
        shell: bash
        env:
          CONFIG_NAME: ${{ matrix.friendly_name }}
          CONFIG_FILE: ${{ matrix.file }}
          CONFIG_SLUG: ${{ matrix.slug }}
          JOB_STATUS: ${{ job.status }}
        run: |-
          {
            if [[ "${JOB_STATUS}" == "success" ]]; then
              echo "## ✅ ${CONFIG_NAME}"
            else
              echo "## ❌ ${CONFIG_NAME}"
            fi

            echo
            echo "- Config: \`${CONFIG_FILE}\`"
            echo "- Result: \`${JOB_STATUS}\`"
            echo

            if [[ -f "logs/${CONFIG_SLUG}.log" ]]; then
              echo "<details>"
              echo "<summary>ESPHome output</summary>"
              echo
              echo '```text'
              tail -n 200 "logs/${CONFIG_SLUG}.log"
              echo '```'
              echo
              echo "</details>"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
